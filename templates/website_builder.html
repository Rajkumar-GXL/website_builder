<!DOCTYPE html>
<html>
<head>
    <title>Website Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-500 to-purple-600 min-h-screen p-8">
    <div class="max-w-2xl mx-auto bg-white/90 backdrop-blur-xl rounded-3xl shadow-2xl p-8">
        <h1 class="text-4xl font-bold text-center text-gray-800 mb-4">Website Creator</h1>
        <p class="text-center text-gray-600 mb-8">Create complete website in ONE CLICK!</p>
        
        <form id="websiteForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Website Title</label>
                <input type="text" id="websiteTitle" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500"
                       placeholder="e.g. FashionHub, TechStore">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Category</label>
                <select id="categorySelect" required class="w-full px-4 py-3 border border-gray-300 rounded-xl">
                    <option value="">Loading categories...</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Subcategory</label>
                <select id="subcategorySelect" disabled required class="w-full px-4 py-3 border border-gray-300 rounded-xl">
                    <option value="">Select category first</option>
                </select>
            </div>
            
            <button type="submit" id="createBtn" disabled
                    class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-4 px-8 rounded-2xl text-lg font-semibold shadow-xl hover:shadow-2xl">
                CREATE WEBSITE
            </button>
        </form>
        
        <div id="status" class="mt-6 hidden p-4 rounded-xl"></div>
    </div>

    <script>
        // Load categories
        fetch('/api/website-builder/categories')
            .then(r => r.json())
            .then(data => {
                const select = document.getElementById('categorySelect');
                select.innerHTML = '<option value="">Choose category...</option>';
                data.categories.forEach(cat => {
                    select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
                });
            });

        // Category → Subcategory
        document.getElementById('categorySelect').addEventListener('change', (e) => {
            const catId = e.target.value;
            const subSelect = document.getElementById('subcategorySelect');
            const createBtn = document.getElementById('createBtn');
            
            subSelect.disabled = !catId;
            subSelect.innerHTML = '<option value="">Choose subcategory...</option>';
            createBtn.disabled = true;
            
            if (catId) {
                fetch(`/api/website-builder/subcategories/${catId}`)
                    .then(r => r.json())
                    .then(data => {
                        data.subcategories.forEach(sub => {
                            subSelect.innerHTML += `<option value="${sub.id}">${sub.name}</option>`;
                        });
                    });
            }
        });

        // Form validation
        document.getElementById('websiteForm').addEventListener('input', () => {
            const title = document.getElementById('websiteTitle').value;
            const cat = document.getElementById('categorySelect').value;
            const sub = document.getElementById('subcategorySelect').value;
            document.getElementById('createBtn').disabled = !(title && cat && sub);
        });

        // CREATE WEBSITE
        document.getElementById('websiteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                website_title: document.getElementById('websiteTitle').value,
                category_id: parseInt(document.getElementById('categorySelect').value),
                subcategory_id: parseInt(document.getElementById('subcategorySelect').value)
            };
            
            const btn = document.getElementById('createBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerHTML = '⏳ Creating...';
            status.classList.remove('hidden');
            status.innerHTML = '<div class="bg-blue-100 text-blue-800 p-4 rounded-xl">Creating website...</div>';
            
            try {
                const response = await fetch('/api/website-builder/create-website', {

                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    status.innerHTML = `
                        <div class="bg-green-100 border border-green-400 text-green-800 p-6 rounded-xl">
                            <h3 class="font-bold text-xl mb-2">🎉 ${result.message}</h3>
                            <p><strong>Visit:</strong> 
                                <a href="${result.website_url}" target="_blank" class="font-bold text-blue-600 hover:underline block p-2 bg-blue-50 rounded mt-2">${result.website_url}</a>
                            </p>
                        </div>
                    `;
                } else {
                    throw new Error(result.detail || 'Failed');
                }
            } catch (error) {
                status.innerHTML = `<div class="bg-red-100 border border-red-400 text-red-800 p-4 rounded-xl">${error.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 CREATE WEBSITE';
            }
        });
    </script>
</body>
</html>
